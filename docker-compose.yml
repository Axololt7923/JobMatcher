services:
  postgres:
    image: postgres:16-alpine
    container_name: job-matcher-db
    environment:
      POSTGRES_DB: job-matcher
      POSTGRES_USER: ax0lotl79
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"                  # host:container
    volumes:
      - postgres_data:/var/lib/postgresql/data   # no data lost when restart
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ax0lotl79 -d job-matcher"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
